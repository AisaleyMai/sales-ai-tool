<!DOCTYPE html>
<html>
<head><h1>销冠AI测试版</h1>

  <style>
    body {
      font-family: Arial;
      display: flex;
      padding: 40px;
      background: #f5f5f5;
    }

    textarea {
      width: 420px;
      height: 260px;
      padding: 15px;
      font-size: 16px;
      border-radius: 12px;
      border: 2px solid #6c8cff;
    }

    .left {
      width: 45%;
    }

    .right {
      width: 55%;
      margin-left: 40px;
    }

    .card {
      background: #f5e6c8;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 2px solid #6c8cff;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: #8ed1c2;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    .copy-btn {
      background: #ffb6c1;
      margin-top: 10px;
    }

    h1 {
      margin-bottom: 30px;
    }

  </style>
</head>

<body>

<div class="left">
  <h1>人人都可以是销冠</h1>

  <textarea
    id="userInput"
    placeholder="输入用户发送的话..."
  ></textarea>

  <br>

  <button onclick="getReply()">
    生成话术
  </button>
</div>

<div class="right">

  <div class="card">
    <h3>话术1（推荐）</h3>
    <p id="reply1"></p>
    <button class="copy-btn" onclick="copyText('reply1')">
      复制
    </button>
  </div>

  <div class="card">
    <h3>话术2</h3>
    <p id="reply2"></p>
    <button class="copy-btn" onclick="copyText('reply2')">
      复制
    </button>
  </div>

  <div class="card">
    <h3>话术3</h3>
    <p id="reply3"></p>
    <button class="copy-btn" onclick="copyText('reply3')">
      复制
    </button>
  </div>

</div>

<script>

async function getReply() {
  
 alert("按钮成功点击了");

  const userInput =
    document.getElementById("userInput").value;

  const response = await fetch("/api/chat", {
    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      message: userInput
    })
  });

  const data = await response.json();

  const replies = data.reply.split("###");

  document.getElementById("reply1").innerText =
    replies[0] || "";

  document.getElementById("reply2").innerText =
    replies[1] || "";

  document.getElementById("reply3").innerText =
    replies[2] || "";
}

function copyText(id) {

  const text =
    document.getElementById(id).innerText;

  navigator.clipboard.writeText(text);

  alert("已复制");
}

</script>

</body>
</html>
